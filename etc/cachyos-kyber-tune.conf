# /etc/cachyos-kyber-tune.conf — Per-device Kyber I/O scheduler overrides
#
# Section names are matched as case-insensitive substrings against the
# NVMe model string from sysfs. The first matching section wins.
# Use [DEFAULT] to override the built-in defaults for all devices
# that don't match any other section.
#
# Available keys:
#   read_lat_nsec   — Kyber read latency target (nanoseconds)
#   write_lat_nsec  — Kyber write latency target (nanoseconds)
#   nr_requests     — block layer queue depth
#
# Built-in tiers (for reference):
#   Optane:    read=50000     write=100000     nr_requests=128
#   Gen5:      read=200000    write=2000000    nr_requests=256
#   High-end:  read=500000    write=5000000    nr_requests=256
#   Mid-range: read=2000000   write=10000000   nr_requests=256
#   Budget:    read=5000000   write=20000000   nr_requests=128
#
# Example: override a specific drive model
# [T500]
# read_lat_nsec = 3000000
# write_lat_nsec = 15000000
# nr_requests = 128
#
# Example: change defaults for all unrecognized devices
# [DEFAULT]
# read_lat_nsec = 2000000
# write_lat_nsec = 10000000
# nr_requests = 256
